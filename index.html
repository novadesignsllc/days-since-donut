<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Days Since</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍩</text></svg>">
<link rel="apple-touch-icon" href="apple-touch-icon-v2.png">
<meta name="apple-mobile-web-app-title" content="Donuts">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --ink:#111318; --muted:#8a8f98; --line:#ececef;
    --hover:#f6f7f8; --accent:#111318;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--ink);
    font-family:'Lexend',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    touch-action:manipulation;
  }
  button{touch-action:manipulation}
  body{min-height:100vh}

  /* ---------- VIEWS (tab bodies) ---------- */
  .view{display:none}
  .view.active{display:flex}

  /* ---------- LEFT SIDEBAR ---------- */
  .sidebar{
    width:300px;flex-shrink:0;border-right:1px solid var(--line);
    height:calc(100vh - 56px);display:flex;flex-direction:column;
  }
  .side-head{padding:24px 20px 14px}
  .side-head h1{font-size:15px;font-weight:700;letter-spacing:.01em}
  .side-head p{font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}

  .addbar{padding:0 16px 14px;display:flex;gap:8px}
  .addbar input{
    flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-family:'Lexend';font-size:14px;font-weight:400;color:var(--ink);
  }
  .addbar input:focus{outline:none;border-color:var(--ink)}
  .addbar button{
    border:none;background:var(--ink);color:#fff;border-radius:10px;
    padding:0 14px;font-family:'Lexend';font-size:18px;font-weight:500;cursor:pointer;
  }
  .addbar button:hover{opacity:.85}

  .people{flex:1;overflow-y:auto;padding:4px 8px 20px}
  .person{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:11px 12px;border-radius:10px;cursor:default;
  }
  .person:hover{background:var(--hover)}
  .person .name{
    font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;flex:1;user-select:none;
  }
  .person .tap{
    display:flex;align-items:center;gap:6px;flex-shrink:0;
  }
  .person .count{font-size:14px;font-weight:600;color:var(--muted);min-width:18px;text-align:right;margin-right:2px}
  .person .step{
    width:30px;height:30px;border-radius:9px;border:1px solid var(--line);
    background:#fff;font-size:19px;font-weight:400;line-height:1;color:var(--ink);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.1s;
  }
  .person .step:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .person .step:active{transform:scale(.9)}
  .person .rst{
    height:30px;padding:0 10px;border-radius:9px;border:1px solid var(--line);
    background:#fff;font-family:'Lexend';font-size:12px;font-weight:600;color:var(--muted);
    cursor:pointer;transition:.1s;
  }
  .person .rst:hover{background:#e5523b;color:#fff;border-color:#e5523b}
  .person .rst:active{transform:scale(.94)}

  .side-empty{padding:24px 16px;color:var(--muted);font-size:13px;line-height:1.6}
  .side-foot{padding:12px 20px;border-top:1px solid var(--line);color:var(--muted);
    font-size:11px;font-weight:500;letter-spacing:.02em}

  /* ---------- MIDDLE BOARD ---------- */
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 24px 90px;min-height:calc(100vh - 56px)}
  .board{width:100%;max-width:440px}
  .board-title{font-size:15px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);margin-bottom:20px;text-align:center;line-height:1.5;text-wrap:balance}

  .card{
    display:flex;align-items:baseline;justify-content:space-between;gap:14px;
    padding:12px 4px;border-bottom:1px solid var(--line);
  }
  .card:last-child{border-bottom:none}
  .card .who{font-size:18px;font-weight:600;letter-spacing:-.01em}
  .card .val{display:flex;align-items:baseline;gap:6px}
  .card .val .n{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.02em}
  .card .val .u{font-size:10px;font-weight:500;color:var(--muted)}
  .card.zero .n{color:var(--muted)}

  .main-empty{margin-top:80px;text-align:center;color:var(--muted)}
  .main-empty h2{font-size:22px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .main-empty p{font-size:14px;font-weight:400;line-height:1.6}

  /* right-click hint on remove */
  .remove{
    background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;
    opacity:0;transition:.12s;padding:0 2px;line-height:1;
  }
  .person:hover .remove{opacity:.6}
  .remove:hover{opacity:1;color:#e5523b}

  /* inline rename input */
  .name-edit{
    flex:1;min-width:0;padding:6px 8px;border:1px solid var(--ink);border-radius:8px;
    font-family:'Lexend';font-size:15px;font-weight:500;color:var(--ink);
  }
  .name-edit:focus{outline:none}

  /* ---------- BOTTOM TAB BAR ---------- */
  .tabbar{
    position:fixed;bottom:0;left:0;right:0;height:56px;z-index:20;
    display:flex;background:var(--bg);border-top:1px solid var(--line);
  }
  .tab{
    flex:1;border:none;background:none;cursor:pointer;
    font-family:'Lexend';font-size:14px;font-weight:600;color:var(--muted);
    display:flex;align-items:center;justify-content:center;gap:8px;
    border-top:2px solid transparent;margin-top:-1px;
  }
  .tab.active{color:var(--ink);border-top-color:var(--ink)}
  .tab:hover{background:var(--hover)}

  /* ---------- PIPELINE: add-appointment form ---------- */
  .appt-form{
    padding:14px 16px 16px;border-top:1px solid var(--line);
    display:flex;flex-direction:column;gap:8px;flex-shrink:0;
  }
  .appt-form .af-title{font-size:12px;font-weight:700;letter-spacing:.01em;margin-bottom:2px}
  .appt-form select,.appt-form input{
    padding:9px 11px;border:1px solid var(--line);border-radius:10px;
    font-family:'Lexend';font-size:14px;font-weight:400;color:var(--ink);background:#fff;
  }
  .appt-form select:focus,.appt-form input:focus{outline:none;border-color:var(--ink)}
  .appt-form button{
    border:none;background:var(--ink);color:#fff;border-radius:10px;
    padding:10px 14px;font-family:'Lexend';font-size:14px;font-weight:600;cursor:pointer;
  }
  .appt-form button:hover{opacity:.85}

  /* ---------- PIPELINE: day sections ---------- */
  .pipe-wrap{max-width:500px}
  .pl-day{
    border:1px solid var(--line);border-radius:14px;margin-bottom:16px;
    overflow:hidden;background:#fff;
  }
  .pl-day.today{border-color:var(--ink)}
  .pl-dayhead{
    display:flex;align-items:baseline;justify-content:space-between;gap:12px;
    padding:12px 16px;background:var(--hover);border-bottom:1px solid var(--line);
  }
  .pl-day.today .pl-dayhead{background:var(--ink);border-bottom-color:var(--ink)}
  .pl-daylabel{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
  .pl-day.today .pl-daylabel{color:#fff}
  .pl-daycount{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}
  .pl-day.today .pl-daycount{color:#c9ccd1}
  .pl-body{padding:2px 0}
  .pl-row{
    display:flex;gap:14px;padding:11px 16px;align-items:flex-start;
    border-bottom:1px solid var(--line);
  }
  .pl-row:last-child{border-bottom:none}
  .pl-rep{flex:0 0 128px;font-size:15px;font-weight:600;color:var(--ink);padding-top:4px;line-height:1.3}
  .pl-appts{flex:1;display:flex;flex-direction:column;gap:2px;min-width:0}
  .pl-empty{padding:14px 16px;color:var(--muted);font-size:13px;font-style:italic}

  .appt{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:8px}
  .appt:hover{background:var(--hover)}
  .atxt{font-size:15px;cursor:pointer;line-height:1.35;flex:1}
  .ax{
    opacity:0;border:none;background:none;color:var(--muted);font-size:16px;
    line-height:1;cursor:pointer;padding:0 2px;flex-shrink:0;
  }
  .appt:hover .ax{opacity:.55}
  .ax:hover{opacity:1;color:#e5523b}
  @media (hover:none){.ax{opacity:.4}}

  /* ==================================================================
     DONUTS — "Sugar Rush" candy theme. Everything here is scoped to
     #view-donuts so the Pipeline tab is completely unaffected.
     ================================================================== */
  #view-donuts{
    --d-pink:#ff5fa2; --d-pink-soft:#ffd3e6; --d-ink:#5a3543; --d-mut:#c98aa5;
    color:var(--d-ink);
    font-family:'Fredoka','Lexend',sans-serif;
    background:
      radial-gradient(circle at 8% 14%, rgba(255,214,107,.55) 0 5px, transparent 6px),
      radial-gradient(circle at 92% 10%, rgba(123,184,255,.55) 0 5px, transparent 6px),
      radial-gradient(circle at 88% 88%, rgba(123,216,201,.55) 0 5px, transparent 6px),
      radial-gradient(circle at 16% 92%, rgba(199,155,255,.55) 0 5px, transparent 6px),
      linear-gradient(160deg,#fff2f8 0%,#ffe1ef 55%,#ffd3e6 100%);
  }
  /* sidebar / controls */
  #view-donuts .sidebar{border-right:2px dashed var(--d-pink-soft);background:rgba(255,255,255,.5)}
  #view-donuts .side-head h1{font-family:'Fredoka';font-weight:600;font-size:20px;color:var(--d-pink)}
  #view-donuts .side-head p{color:var(--d-mut)}
  #view-donuts .addbar input{border:2px solid var(--d-pink-soft);border-radius:14px;font-family:'Fredoka';color:var(--d-ink)}
  #view-donuts .addbar input:focus{border-color:var(--d-pink)}
  #view-donuts .addbar button{background:var(--d-pink);border-radius:14px;font-weight:700}
  #view-donuts .person:hover{background:rgba(255,150,200,.16)}
  #view-donuts .person .name{font-family:'Fredoka';font-weight:500;color:var(--d-ink)}
  #view-donuts .person .count{font-family:'Fredoka';font-weight:600;color:var(--d-pink)}
  #view-donuts .person .step{border:2px solid var(--d-pink-soft);border-radius:11px;color:var(--d-pink);font-weight:600}
  #view-donuts .person .step:hover{background:var(--d-pink);color:#fff;border-color:var(--d-pink)}
  #view-donuts .person .rst{border:2px solid var(--d-pink-soft);border-radius:11px;color:var(--d-mut)}
  #view-donuts .person .rst:hover{background:#ff8a5c;border-color:#ff8a5c;color:#fff}
  #view-donuts .name-edit{border:2px solid var(--d-pink);border-radius:11px;font-family:'Fredoka';color:var(--d-ink)}
  #view-donuts .side-empty{color:var(--d-mut)}
  #view-donuts .side-foot{color:var(--d-mut);border-top:2px dashed var(--d-pink-soft)}

  /* add-a-person control (top-left) */
  #view-donuts .add-cluster{position:absolute;top:22px;left:22px;z-index:5;display:flex;align-items:center;gap:10px}
  #view-donuts .add-fab{
    width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--d-pink);color:#fff;font-family:'Fredoka';font-weight:600;font-size:26px;line-height:1;
    box-shadow:0 6px 14px rgba(255,95,162,.35);transition:transform .12s;
  }
  #view-donuts .add-fab:hover{transform:scale(1.06)}
  #view-donuts .add-fab:active{transform:scale(.94)}
  #view-donuts .add-pop[hidden]{display:none}
  #view-donuts .add-pop input{
    padding:11px 14px;border:2px solid var(--d-pink-soft);border-radius:14px;
    font-family:'Fredoka';font-size:15px;color:var(--d-ink);background:#fff;width:200px;
    box-shadow:0 6px 14px rgba(255,95,162,.15);
  }
  #view-donuts .add-pop input:focus{outline:none;border-color:var(--d-pink)}

  /* hero — giant donut */
  #view-donuts .main{justify-content:flex-start;padding-top:30px;position:relative}
  #view-donuts .board{max-width:480px}
  #view-donuts .donut-hero{text-align:center;margin-bottom:18px}
  #view-donuts .donut-hero svg{
    width:154px;height:154px;
    filter:drop-shadow(0 12px 16px rgba(255,95,162,.32));
    transform:rotate(-4deg);
  }
  #view-donuts .donut-title{
    font-family:'Fredoka';font-weight:700;font-size:36px;line-height:1;
    color:var(--d-pink);letter-spacing:.5px;margin-top:6px;
    text-shadow:0 2px 0 #fff, 0 4px 10px rgba(255,95,162,.25);
  }
  #view-donuts .donut-sub{font-family:'Fredoka';font-weight:400;font-size:14px;color:var(--d-mut);margin-top:8px}

  /* scoreboard cards */
  #view-donuts #board{display:flex;flex-direction:column;gap:11px}
  #view-donuts .card{
    border-bottom:none;background:#fff;border:2px solid var(--d-pink-soft);
    border-radius:20px;padding:14px 20px;align-items:center;
    box-shadow:0 6px 14px rgba(255,95,162,.10);
  }
  #view-donuts .card .who{flex:1;min-width:0;font-family:'Fredoka';font-weight:600;font-size:20px;color:var(--d-ink);display:flex;align-items:center}
  /* per-row controls — hidden until you hover the row (keeps screenshots clean) */
  #view-donuts .ctrls{display:flex;align-items:center;gap:6px;margin:0 8px;opacity:0;transition:opacity .14s}
  #view-donuts .card:hover .ctrls,
  #view-donuts .card:active .ctrls,
  #view-donuts .card:focus-within .ctrls{opacity:1}
  #view-donuts .ctrls .step{
    width:32px;height:32px;border-radius:11px;border:2px solid var(--d-pink-soft);background:#fff;
    color:var(--d-pink);font-family:'Lexend';font-size:19px;font-weight:600;line-height:1;cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:.1s;
  }
  #view-donuts .ctrls .step:hover{background:var(--d-pink);color:#fff;border-color:var(--d-pink)}
  #view-donuts .ctrls .step:active{transform:scale(.9)}
  #view-donuts .ctrls .rst{
    height:32px;padding:0 11px;border-radius:11px;border:2px solid var(--d-pink-soft);background:#fff;
    color:var(--d-mut);font-family:'Fredoka';font-size:12px;font-weight:600;cursor:pointer;transition:.1s;
  }
  #view-donuts .ctrls .rst:hover{background:#ff8a5c;border-color:#ff8a5c;color:#fff}
  #view-donuts .ctrls .rst.danger{width:32px;padding:0;font-size:17px;color:#e5647f}
  #view-donuts .ctrls .rst.danger:hover{background:#e5523b;border-color:#e5523b;color:#fff}
  #view-donuts .card .flame{margin-left:7px;font-size:18px;animation:flick 1.1s ease-in-out infinite}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-4deg)}50%{transform:scale(1.18) rotate(5deg)}}
  #view-donuts .card .val .n{font-family:'Fredoka';font-weight:700;font-size:36px;color:var(--d-pink)}
  #view-donuts .card .val .u{color:var(--d-mut);font-weight:500}
  #view-donuts .card.zero .n{color:#e8bcd0}
  #view-donuts .card.lead{
    border-color:var(--d-pink);
    background:linear-gradient(100deg,#fff 0%,#fff4f9 100%);
    box-shadow:0 10px 22px rgba(255,95,162,.24);
  }
  #view-donuts .main-empty h2{font-family:'Fredoka';color:var(--d-pink)}
  #view-donuts .main-empty p{color:var(--d-mut)}

  @media (max-width:720px){
    #view-donuts .donut-hero svg{width:120px;height:120px}
    #view-donuts .donut-title{font-size:30px}
    .view{flex-direction:column}
    .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    .people{max-height:44vh}
    .main{padding:32px 20px 90px}
    .board-title{line-height:1.7}
  }
</style>
</head>
<body>

<!-- ============ DONUTS VIEW ============ -->
<div class="view active" id="view-donuts">
  <main class="main">
    <!-- add a person (top-left) -->
    <div class="add-cluster">
      <button class="add-fab" title="Add a person" onclick="toggleAdd()">+</button>
      <div class="add-pop" id="addPop" hidden>
        <input id="nameInput" placeholder="Add a person"
          onkeydown="if(event.key==='Enter')addPerson();else if(event.key==='Escape')closeAdd()">
      </div>
    </div>
    <div class="board">
      <div class="donut-hero">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Donut">
          <!-- dough -->
          <path fill="#e0a56a" fill-rule="evenodd"
            d="M12 60 a48 48 0 1 0 96 0 a48 48 0 1 0 -96 0 Z M42 60 a18 18 0 1 0 36 0 a18 18 0 1 0 -36 0 Z"/>
          <!-- frosting -->
          <path fill="#ff6fae" fill-rule="evenodd"
            d="M17 60 a43 43 0 1 0 86 0 a43 43 0 1 0 -86 0 Z M39 60 a21 21 0 1 0 42 0 a21 21 0 1 0 -42 0 Z"/>
          <!-- glossy highlight -->
          <path d="M40 40 q10 -8 24 -6" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-opacity=".55"/>
          <!-- sprinkles -->
          <g>
            <rect x="55.5" y="27.3" width="9" height="3.4" rx="1.7" fill="#7bd8c9" transform="rotate(12 60 29)"/>
            <rect x="41.5" y="31.3" width="9" height="3.4" rx="1.7" fill="#ffd76b" transform="rotate(-32 46 33)"/>
            <rect x="70.5" y="31.3" width="9" height="3.4" rx="1.7" fill="#7bb8ff" transform="rotate(38 75 33)"/>
            <rect x="30.5" y="46.3" width="9" height="3.4" rx="1.7" fill="#ffffff" transform="rotate(68 35 48)"/>
            <rect x="81.5" y="48.3" width="9" height="3.4" rx="1.7" fill="#c79bff" transform="rotate(-62 86 50)"/>
            <rect x="28.5" y="66.3" width="9" height="3.4" rx="1.7" fill="#ffd76b" transform="rotate(-22 33 68)"/>
            <rect x="83.5" y="68.3" width="9" height="3.4" rx="1.7" fill="#7bd8c9" transform="rotate(22 88 70)"/>
            <rect x="39.5" y="84.3" width="9" height="3.4" rx="1.7" fill="#7bb8ff" transform="rotate(52 44 86)"/>
            <rect x="69.5" y="85.3" width="9" height="3.4" rx="1.7" fill="#ffffff" transform="rotate(-48 74 87)"/>
            <rect x="55.5" y="90.3" width="9" height="3.4" rx="1.7" fill="#c79bff" transform="rotate(8 60 92)"/>
          </g>
        </svg>
        <div class="donut-title">Donut Streak</div>
        <div class="donut-sub">Who's eaten the most donuts in a row? 🔥</div>
      </div>
      <div id="board"></div>
    </div>
  </main>
</div>

<!-- ============ PIPELINE VIEW ============ -->
<div class="view" id="view-pipeline">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="side-head">
      <h1>Pipeline</h1>
      <p>Manage reps and log appointments for the next 3 days.</p>
    </div>
    <div class="addbar">
      <input id="repInput" placeholder="Add a rep" onkeydown="if(event.key==='Enter')addRep()">
      <button onclick="addRep()">+</button>
    </div>
    <div class="people" id="repList"></div>
    <div class="appt-form">
      <div class="af-title">Add appointment</div>
      <select id="apRep"></select>
      <select id="apDay"></select>
      <input id="apName" placeholder="Customer first name" onkeydown="if(event.key==='Enter')addAppt()">
      <input id="apTime" placeholder="Time (e.g. 2pm)" onkeydown="if(event.key==='Enter')addAppt()">
      <button onclick="addAppt()">Add appointment</button>
    </div>
    <div class="side-foot">Pipeline · v1.2.0</div>
  </aside>

  <!-- MIDDLE BOARD -->
  <main class="main">
    <div class="board pipe-wrap">
      <div class="board-title">Our Pipeline · Next 3 Days</div>
      <div id="pipeBoard"></div>
    </div>
  </main>
</div>

<!-- ============ BOTTOM TAB BAR ============ -->
<nav class="tabbar">
  <button class="tab active" data-tab="donuts" onclick="switchTab('donuts')">🍩 Donuts</button>
  <button class="tab" data-tab="pipeline" onclick="switchTab('pipeline')">📋 Pipeline</button>
</nav>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl8selnfPIqGcBTLkk1INry-Invp3W6IU",
  authDomain: "donut-tracker-942df.firebaseapp.com",
  projectId: "donut-tracker-942df",
  storageBucket: "donut-tracker-942df.firebasestorage.app",
  messagingSenderId: "1036050542274",
  appId: "1:1036050542274:web:1fbebe3618ec9de2d2555b",
  measurementId: "G-4CSJ9LJET9"
};

// Secret board id — this one document holds all your data (donuts + pipeline).
const BOARD_ID = "7534c7a2c2a613d9183e400f";
const CACHE_KEY = 'daysSince.cache';
const TAB_KEY = 'daysSince.tab';

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const boardRef = doc(db, "boards", BOARD_ID);

// Coerce any stored/synced doc into the full shape we expect.
function normalize(s){
  s = s || {};
  return {
    people: Array.isArray(s.people) ? s.people : [],   // donut counter
    reps:   Array.isArray(s.reps)   ? s.reps   : [],   // pipeline reps
    appts:  Array.isArray(s.appts)  ? s.appts  : []    // pipeline appointments
  };
}

let state = loadCache();          // instant paint from local cache
let ready = false;                // becomes true after first Firestore snapshot

function loadCache(){
  try{const r=localStorage.getItem(CACHE_KEY);if(r)return normalize(JSON.parse(r));}catch(e){}
  return normalize();
}
function cache(){try{localStorage.setItem(CACHE_KEY,JSON.stringify(state));}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// Push the whole board to Firestore (last-write-wins). Cache locally too.
// Must write ALL fields so saving one tool never wipes the other's data.
function save(){
  cache();
  setDoc(boardRef, {people: state.people, reps: state.reps, appts: state.appts})
    .catch(err=>console.warn('save failed', err));
}

// Live sync: any change from any device updates every open device.
onSnapshot(boardRef, snap=>{
  ready = true;
  if(snap.exists()){
    state = normalize(snap.data());
  } else {
    // First run — create the empty board document.
    state = normalize();
    setDoc(boardRef, state).catch(err=>console.warn('init failed', err));
  }
  cache();
  render();
}, err=>console.warn('snapshot error', err));

function addPerson(){
  const el=document.getElementById('nameInput');
  const name=el.value.trim();
  if(!name)return;
  state.people.push({id:uid(),name,count:0});
  el.value='';el.focus();save();render();
}
function removePerson(id){
  state.people=state.people.filter(p=>p.id!==id);save();render();
}
function bump(id){
  const p=state.people.find(x=>x.id===id);if(!p)return;
  p.count++;save();render();
}
function dec(id){
  const p=state.people.find(x=>x.id===id);if(!p)return;
  if(p.count>0){p.count--;save();render();}
}
function reset(id){
  const p=state.people.find(x=>x.id===id);if(!p)return;
  if(p.count===0)return;
  p.count=0;save();render();
}

/* --------- rename people (double-click) --------- */
let editingId=null;
function startRename(id){
  editingId=id;render();
  requestAnimationFrame(()=>{const el=document.querySelector('.name-edit');if(el){el.focus();el.select();}});
}
function commitRename(id,val){
  if(editingId!==id)return;            // already cancelled/committed
  editingId=null;
  const p=state.people.find(x=>x.id===id);
  const n=(val||'').trim();
  if(p&&n)p.name=n;
  save();render();
}
function cancelRename(){editingId=null;render();}

/* --------- add-person popover (top-left +) --------- */
function toggleAdd(){
  const pop=document.getElementById('addPop');
  if(pop.hasAttribute('hidden')){
    pop.removeAttribute('hidden');
    const i=document.getElementById('nameInput');i.value='';i.focus();
  } else { closeAdd(); }
}
function closeAdd(){document.getElementById('addPop').setAttribute('hidden','');}

/* ---------------- PIPELINE ---------------- */

// Local date helpers (keep everything in the user's own timezone).
function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function nextDays(n){
  const base=new Date(); base.setHours(0,0,0,0);
  const out=[];
  for(let i=0;i<n;i++){ const d=new Date(base); d.setDate(base.getDate()+i); out.push(d); }
  return out;
}
function dayLabel(d,i){
  const wd=d.toLocaleDateString('en-US',{weekday:'short'});
  const md=`${d.getMonth()+1}/${d.getDate()}`;
  return i===0 ? `Today · ${wd} ${md}` : `${wd} ${md}`;
}
// Parse "2pm" / "10:30am" / "14:00" to minutes for sorting; unparseable sorts last.
function parseTime(s){
  if(!s) return 1e9;
  const m=String(s).trim().toLowerCase().match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/);
  if(!m) return 1e9;
  let h=+m[1]; const min=m[2]?+m[2]:0; const ap=m[3];
  if(ap==='pm'&&h!==12) h+=12;
  if(ap==='am'&&h===12) h=0;
  return h*60+min;
}

function addRep(){
  const el=document.getElementById('repInput');
  const name=el.value.trim();
  if(!name)return;
  state.reps.push({id:uid(),name});
  el.value='';el.focus();save();render();
}
function removeRep(id){
  state.reps=state.reps.filter(r=>r.id!==id);
  state.appts=state.appts.filter(a=>a.repId!==id);  // drop their appointments too
  save();render();
}
function addAppt(){
  const repId=document.getElementById('apRep').value;
  const date=document.getElementById('apDay').value;
  const name=document.getElementById('apName').value.trim();
  const time=document.getElementById('apTime').value.trim();
  if(!repId||!date||!name)return;
  state.appts.push({id:uid(),repId,date,name,time,confirmed:false});
  document.getElementById('apName').value='';
  document.getElementById('apTime').value='';
  document.getElementById('apName').focus();
  save();render();
}
function toggleAppt(id){
  const a=state.appts.find(x=>x.id===id);if(!a)return;
  a.confirmed=!a.confirmed;save();render();
}
function removeAppt(id){
  state.appts=state.appts.filter(a=>a.id!==id);save();render();
}

// Tab switching (persisted so a refresh stays on the same tool).
function switchTab(name){
  try{localStorage.setItem(TAB_KEY,name);}catch(e){}
  document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id==='view-'+name));
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
}

function render(){renderBoard();renderReps();renderApptForm();renderPipe();}

// Inline onclick handlers live on window; module scope is private by default.
Object.assign(window, {
  addPerson, removePerson, bump, dec, reset,
  startRename, commitRename, cancelRename, toggleAdd, closeAdd,
  addRep, removeRep, addAppt, toggleAppt, removeAppt, switchTab
});

function renderBoard(){
  const host=document.getElementById('board');
  if(state.people.length===0){
    host.innerHTML=`<div class="main-empty">
      <h2>Nobody here yet</h2>
      <p>Tap the&nbsp;+ button up top to add<br>your first donut champ. 🍩</p>
    </div>`;
    return;
  }
  const max=Math.max(0,...state.people.map(p=>p.count));
  // Scoreboard: highest count on top (stable for ties).
  const rows=[...state.people].sort((a,b)=>b.count-a.count);
  host.innerHTML=rows.map(p=>{
    const lead=p.count>0 && p.count===max;
    const nameCell = editingId===p.id
      ? `<input class="name-edit" value="${esc(p.name)}"
           onblur="commitRename('${p.id}',this.value)"
           onkeydown="if(event.key==='Enter'){this.blur()}else if(event.key==='Escape'){cancelRename()}">`
      : `<span class="name" title="Double-click to rename" ondblclick="startRename('${p.id}')">${esc(p.name)}</span>`;
    return `<div class="card ${p.count===0?'zero':''} ${lead?'lead':''}">
      <div class="who">${nameCell}${lead?'<span class="flame">🔥</span>':''}</div>
      <div class="ctrls">
        <button class="step" title="Subtract one" onclick="dec('${p.id}')">&minus;</button>
        <button class="step" title="Add one" onclick="bump('${p.id}')">+</button>
        <button class="rst" title="Reset to 0" onclick="reset('${p.id}')">Reset</button>
        <button class="rst danger" title="Remove" onclick="removePerson('${p.id}')">&times;</button>
      </div>
      <div class="val"><span class="n">${p.count}</span><span class="u">${p.count===1?'donut':'donuts'}</span></div>
    </div>`;
  }).join('');
}

function renderReps(){
  const host=document.getElementById('repList');
  if(state.reps.length===0){
    host.innerHTML=`<div class="side-empty">No reps yet. Add one above to get started.</div>`;
    return;
  }
  host.innerHTML=state.reps.map(r=>`
    <div class="person">
      <button class="remove" title="Remove" onclick="removeRep('${r.id}')">&times;</button>
      <span class="name">${esc(r.name)}</span>
    </div>`).join('');
}

// Rebuild the add-appointment dropdowns, preserving the current selection.
function renderApptForm(){
  const repSel=document.getElementById('apRep');
  const daySel=document.getElementById('apDay');
  const prevRep=repSel.value, prevDay=daySel.value;

  repSel.innerHTML = state.reps.length
    ? state.reps.map(r=>`<option value="${r.id}">${esc(r.name)}</option>`).join('')
    : `<option value="">Add a rep first</option>`;

  const days=nextDays(3);
  daySel.innerHTML=days.map((d,i)=>`<option value="${ymd(d)}">${esc(dayLabel(d,i))}</option>`).join('');

  if(prevRep && state.reps.some(r=>r.id===prevRep)) repSel.value=prevRep;
  if(prevDay && days.some(d=>ymd(d)===prevDay)) daySel.value=prevDay;
}

function renderPipe(){
  const host=document.getElementById('pipeBoard');
  if(state.reps.length===0){
    host.innerHTML=`<div class="main-empty">
      <h2>No reps yet</h2>
      <p>Add reps on the left, then log appointments<br>for the next three days.</p>
    </div>`;
    return;
  }
  const days=nextDays(3);

  host.innerHTML=days.map((d,i)=>{
    const k=ymd(d);
    const dayAppts=state.appts.filter(a=>a.date===k);
    const conf=dayAppts.filter(a=>a.confirmed).length;
    // Only reps who actually have something this day — in rep order.
    const reps=state.reps.filter(r=>dayAppts.some(a=>a.repId===r.id));

    const rows = reps.length ? reps.map(r=>{
      const list=dayAppts.filter(a=>a.repId===r.id).sort((a,b)=>parseTime(a.time)-parseTime(b.time));
      const chips=list.map(a=>{
        const t=a.time?` · ${esc(a.time)}`:'';
        return `<span class="appt">
          <span class="atxt" title="Tap to toggle confirmed" onclick="toggleAppt('${a.id}')">${esc(a.name)}${t} ${a.confirmed?'✅':'❌'}</span>
          <button class="ax" title="Remove" onclick="removeAppt('${a.id}')">&times;</button>
        </span>`;
      }).join('');
      return `<div class="pl-row"><div class="pl-rep">${esc(r.name)}</div><div class="pl-appts">${chips}</div></div>`;
    }).join('') : `<div class="pl-empty">No appointments yet</div>`;

    const count = dayAppts.length ? `${dayAppts.length} appt · ${conf} ✅` : '';
    return `<section class="pl-day ${i===0?'today':''}">
      <div class="pl-dayhead">
        <span class="pl-daylabel">${esc(dayLabel(d,i))}</span>
        <span class="pl-daycount">${count}</span>
      </div>
      <div class="pl-body">${rows}</div>
    </section>`;
  }).join('');
}

// Restore the last-used tab, then paint.
switchTab(localStorage.getItem(TAB_KEY) || 'donuts');
render();
</script>
</body>
</html>
