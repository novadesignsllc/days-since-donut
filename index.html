<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Days Since</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --ink:#111318; --muted:#8a8f98; --line:#ececef;
    --hover:#f6f7f8; --accent:#111318;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    background:var(--bg);color:var(--ink);
    font-family:'Lexend',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
  }
  body{min-height:100vh;display:flex}

  /* ---------- LEFT SIDEBAR ---------- */
  .sidebar{
    width:300px;flex-shrink:0;border-right:1px solid var(--line);
    height:100vh;display:flex;flex-direction:column;
  }
  .side-head{padding:24px 20px 14px}
  .side-head h1{font-size:15px;font-weight:700;letter-spacing:.01em}
  .side-head p{font-size:12px;color:var(--muted);font-weight:400;margin-top:2px}

  .addbar{padding:0 16px 14px;display:flex;gap:8px}
  .addbar input{
    flex:1;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-family:'Lexend';font-size:14px;font-weight:400;color:var(--ink);
  }
  .addbar input:focus{outline:none;border-color:var(--ink)}
  .addbar button{
    border:none;background:var(--ink);color:#fff;border-radius:10px;
    padding:0 14px;font-family:'Lexend';font-size:18px;font-weight:500;cursor:pointer;
  }
  .addbar button:hover{opacity:.85}

  .people{flex:1;overflow-y:auto;padding:4px 8px 20px}
  .person{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:11px 12px;border-radius:10px;cursor:default;
  }
  .person:hover{background:var(--hover)}
  .person .name{
    font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;cursor:context-menu;flex:1;user-select:none;
  }
  .person .tap{
    display:flex;align-items:center;gap:10px;flex-shrink:0;
  }
  .person .count{font-size:14px;font-weight:600;color:var(--muted);min-width:20px;text-align:right}
  .person .plus{
    width:32px;height:32px;border-radius:9px;border:1px solid var(--line);
    background:#fff;font-size:20px;font-weight:400;line-height:1;color:var(--ink);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.1s;
  }
  .person .plus:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
  .person .plus:active{transform:scale(.9)}

  .side-empty{padding:24px 16px;color:var(--muted);font-size:13px;line-height:1.6}

  /* ---------- MIDDLE BOARD ---------- */
  .main{flex:1;display:flex;flex-direction:column;align-items:center;padding:60px 24px}
  .board{width:100%;max-width:620px}
  .board-title{font-size:22px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);margin-bottom:32px;text-align:center}

  .card{
    display:flex;align-items:baseline;justify-content:space-between;gap:20px;
    padding:24px 4px;border-bottom:1px solid var(--line);
  }
  .card:last-child{border-bottom:none}
  .card .who{font-size:26px;font-weight:600;letter-spacing:-.01em}
  .card .val{display:flex;align-items:baseline;gap:8px}
  .card .val .n{font-size:44px;font-weight:700;line-height:1;letter-spacing:-.02em}
  .card .val .u{font-size:14px;font-weight:500;color:var(--muted)}
  .card.zero .n{color:var(--muted)}

  .main-empty{margin-top:80px;text-align:center;color:var(--muted)}
  .main-empty h2{font-size:22px;font-weight:600;color:var(--ink);margin-bottom:8px}
  .main-empty p{font-size:14px;font-weight:400;line-height:1.6}

  /* right-click hint on remove */
  .remove{
    background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;
    opacity:0;transition:.12s;padding:0 2px;line-height:1;
  }
  .person:hover .remove{opacity:.6}
  .remove:hover{opacity:1;color:#e5523b}

  @media (max-width:720px){
    body{flex-direction:column}
    .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--line)}
    .people{max-height:44vh}
    .main{padding:32px 20px}
  }
</style>
</head>
<body>

<!-- LEFT SIDEBAR -->
<aside class="sidebar">
  <div class="side-head">
    <h1>People</h1>
    <p>Tap + to add a day. Right-click a name to set a starting number.</p>
  </div>
  <div class="addbar">
    <input id="nameInput" placeholder="Add a person" onkeydown="if(event.key==='Enter')addPerson()">
    <button onclick="addPerson()">+</button>
  </div>
  <div class="people" id="peopleList"></div>
</aside>

<!-- MIDDLE BOARD -->
<main class="main">
  <div class="board">
    <div class="board-title">How Many Donuts have we eaten in a row? 🍩</div>
    <div id="board"></div>
  </div>
</main>

<script>
const KEY='daysSince.v1';
let state=load();

function load(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return {people:[]};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function uid(){return Math.random().toString(36).slice(2,9);}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function addPerson(){
  const el=document.getElementById('nameInput');
  const name=el.value.trim();
  if(!name)return;
  state.people.push({id:uid(),name,count:0});
  el.value='';el.focus();save();render();
}
function removePerson(id){
  state.people=state.people.filter(p=>p.id!==id);save();render();
}
function bump(id){
  const p=state.people.find(x=>x.id===id);if(!p)return;
  p.count++;save();render();
}
function setStart(id){
  const p=state.people.find(x=>x.id===id);if(!p)return;
  const v=prompt(`Set the day count for ${p.name}:`, p.count);
  if(v===null)return;
  const n=parseInt(v,10);
  if(!isNaN(n)&&n>=0){p.count=n;save();render();}
}

function render(){renderSidebar();renderBoard();}

function renderSidebar(){
  const host=document.getElementById('peopleList');
  if(state.people.length===0){
    host.innerHTML=`<div class="side-empty">No people yet. Add someone above to get started.</div>`;
    return;
  }
  host.innerHTML=state.people.map(p=>`
    <div class="person">
      <button class="remove" title="Remove" onclick="removePerson('${p.id}')">&times;</button>
      <span class="name" oncontextmenu="event.preventDefault();setStart('${p.id}')" title="Right-click to set a starting number">${esc(p.name)}</span>
      <span class="tap">
        <span class="count">${p.count}</span>
        <button class="plus" title="Add a day" onclick="bump('${p.id}')">+</button>
      </span>
    </div>`).join('');
}

function renderBoard(){
  const host=document.getElementById('board');
  if(state.people.length===0){
    host.innerHTML=`<div class="main-empty">
      <h2>Nobody here yet</h2>
      <p>Add people on the left, then tap&nbsp;+ next to a name<br>each day they go without a zero day.</p>
    </div>`;
    return;
  }
  host.innerHTML=state.people.map(p=>`
    <div class="card ${p.count===0?'zero':''}">
      <div class="who">${esc(p.name)}</div>
      <div class="val"><span class="n">${p.count}</span><span class="u">${p.count===1?'donut':'donuts'}</span></div>
    </div>`).join('');
}

render();
</script>
</body>
</html>
